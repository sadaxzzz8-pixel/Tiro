<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tiro Olímpico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary-blue: #1a365d; }
        .bg-primary { background-color: var(--primary-blue); }
    </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <img src="assets/logo.png" alt="Logo" class="h-20 w-20 mx-auto mb-4 rounded-full">
            <h1 class="text-2xl font-bold text-slate-800">Painel Administrativo</h1>
            <p class="text-slate-500">Entre com suas credenciais</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Usuário</label>
                <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-800 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Senha</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-800 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-blue-900 transition shadow-lg">
                Entrar
            </button>
        </form>
        <div id="loginResponse" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>
        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-slate-500 hover:text-primary transition">← Voltar ao site</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseDiv = document.getElementById('loginResponse');
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    localStorage.setItem('adminToken', result.token);
                    window.location.href = '/admin.html';
                } else {
                    throw new Error(result.message || 'Credenciais inválidas');
                }
            } catch (err) {
                responseDiv.textContent = err.message;
                responseDiv.className = 'mt-6 p-4 rounded-xl text-center font-medium bg-red-100 text-red-700';
                responseDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
