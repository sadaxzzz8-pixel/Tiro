<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tiro Olímpico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-blue: #1a365d; }
        .bg-primary { background-color: var(--primary-blue); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-primary text-white hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-6 flex items-center gap-3 border-b border-blue-800">
            <img src="assets/logo.png" alt="Logo" class="h-10 w-10 rounded-full">
            <span class="font-bold text-lg">Painel Admin</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('bookings')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-blue-800 transition active-nav" id="nav-bookings">
                <i class="fas fa-calendar-alt"></i> Agendamentos
            </button>
            <button onclick="showSection('contacts')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-blue-800 transition" id="nav-contacts">
                <i class="fas fa-envelope"></i> Contactos
            </button>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-bold">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-12 overflow-x-hidden">
        <header class="flex justify-between items-center mb-10">
            <h1 id="pageTitle" class="text-3xl font-bold text-slate-800">Agendamentos</h1>
            <div class="flex items-center gap-4">
                <span class="text-slate-500 hidden sm:block">Bem-vindo, Administrador</span>
                <img src="assets/logo.png" alt="Logo" class="h-10 w-10 rounded-full border-2 border-primary">
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-calendar-check"></i></div>
                <div>
                    <p class="text-slate-500 text-sm">Total Agendamentos</p>
                    <h3 id="stat-bookings" class="text-2xl font-bold text-slate-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-envelope-open-text"></i></div>
                <div>
                    <p class="text-slate-500 text-sm">Novos Contactos</p>
                    <h3 id="stat-contacts" class="text-2xl font-bold text-slate-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-12 h-12 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-bullseye"></i></div>
                <div>
                    <p class="text-slate-500 text-sm">Taxa de Conversão</p>
                    <h3 class="text-2xl font-bold text-slate-800">85%</h3>
                </div>
            </div>
        </div>

        <!-- Content Sections -->
        <section id="section-bookings" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Lista de Agendamentos</h2>
                <button onclick="fetchBookings()" class="text-primary hover:underline text-sm font-medium">Atualizar <i class="fas fa-sync-alt ml-1"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">Cliente</th>
                            <th class="px-6 py-4">Contacto</th>
                            <th class="px-6 py-4">Data</th>
                            <th class="px-6 py-4">Hora</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable" class="divide-y divide-slate-100 text-slate-600">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </section>

        <section id="section-contacts" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Mensagens Recebidas</h2>
                <button onclick="fetchContacts()" class="text-primary hover:underline text-sm font-medium">Atualizar <i class="fas fa-sync-alt ml-1"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">Nome</th>
                            <th class="px-6 py-4">E-mail</th>
                            <th class="px-6 py-4">Mensagem</th>
                            <th class="px-6 py-4">Data</th>
                        </tr>
                    </thead>
                    <tbody id="contactsTable" class="divide-y divide-slate-100 text-slate-600">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // Auth Check
        if (!localStorage.getItem('adminToken')) {
            window.location.href = '/login.html';
        }

        async function fetchBookings() {
            try {
                const res = await fetch('/api/admin/bookings');
                const data = await res.json();
                const table = document.getElementById('bookingsTable');
                document.getElementById('stat-bookings').textContent = data.length;
                
                table.innerHTML = data.length ? '' : '<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">Nenhum agendamento encontrado.</td></tr>';
                data.forEach(b => {
                    table.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-medium text-slate-800">${b.name}</td>
                            <td class="px-6 py-4">${b.email}<br><span class="text-xs">${b.phone}</span></td>
                            <td class="px-6 py-4">${b.date}</td>
                            <td class="px-6 py-4">${b.time}</td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-600">${b.status}</span>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Error fetching bookings:', err);
            }
        }

        async function fetchContacts() {
            try {
                const res = await fetch('/api/admin/contacts');
                const data = await res.json();
                const table = document.getElementById('contactsTable');
                document.getElementById('stat-contacts').textContent = data.length;
                
                table.innerHTML = data.length ? '' : '<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">Nenhuma mensagem encontrada.</td></tr>';
                data.forEach(c => {
                    table.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-medium text-slate-800">${c.name}</td>
                            <td class="px-6 py-4">${c.email}</td>
                            <td class="px-6 py-4 text-sm">${c.message}</td>
                            <td class="px-6 py-4 text-xs">${new Date(c.date).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Error fetching contacts:', err);
            }
        }

        function showSection(section) {
            document.getElementById('section-bookings').classList.add('hidden');
            document.getElementById('section-contacts').classList.add('hidden');
            document.getElementById('nav-bookings').classList.remove('bg-blue-800');
            document.getElementById('nav-contacts').classList.remove('bg-blue-800');

            if (section === 'bookings') {
                document.getElementById('section-bookings').classList.remove('hidden');
                document.getElementById('nav-bookings').classList.add('bg-blue-800');
                document.getElementById('pageTitle').textContent = 'Agendamentos';
            } else {
                document.getElementById('section-contacts').classList.remove('hidden');
                document.getElementById('nav-contacts').classList.add('bg-blue-800');
                document.getElementById('pageTitle').textContent = 'Contactos';
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        }

        // Init
        showSection('bookings');
        fetchBookings();
        fetchContacts();
    </script>
</body>
</html>
